<!DOCTYPE html>

<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>ログイン</title>

<link rel="stylesheet" type="text/css" href="../css/style.css">

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</head>
<script th:inline="javascript">
$(document).ready(function() {

	let fail = [[${param.fail}]];
	
	if(fail!=null && fail==1){
		alert("認証コードをもう一度ご確認ください。");
	}
	
	$("#btn").click(function(){
		$("#signupFrm").submit();
	});
	
	
});

</script>


<body>


	<div class="wrap">
		<div class="login-bg">
			<div style="height:1px;"></div>
			<div class="login">
				<img src = "../images/logo.png" class="logo">
				<div class="w-100"></div>
				<div class="w-100"></div>
				<p>メールに送信された認証コードを入力してください。</p>
				<form action="/mailCheck" method="post" name="signupFrm" id="signupFrm">
					<input type="password" name="userNumber" class="w-100 login-bar" id="pass">
					<div class="w-100"></div>
					<input type="button" class="w-100 btn btn-primary" value="次へ" id="btn">
				</form>
				
				<div class="w-100"></div>
				<div class="w-100"></div>
				<hr>
				<div class="w-100"></div>
				<div class="w-100"></div>
				<div class="footer-logo">© miniMMP</div>
			</div>
			
		</div>

	</div>
	
	
	
	
</body>
</html>
