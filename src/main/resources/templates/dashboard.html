<!DOCTYPE html>

<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>DashBoard</title>

<link rel="stylesheet" type="text/css" href="../css/style.css">

<script	src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<link	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"	rel="stylesheet"	integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"	crossorigin="anonymous">
<script	src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"	integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"	crossorigin="anonymous"></script>

</head>
<script>
$(document).ready(function() {

	
});

</script>


<style>
body {
	background-color: #f5f6fa;
}

.sidebar {
	height: 100vh;
	background: #343a40;
	color: white;
	padding-top: 20px;
}

.sidebar a {
	color: white;
	display: block;
	padding: 12px;
	text-decoration: none;
}

.sidebar a:hover {
	background: #495057;
}

.card {
	box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
}
</style>

</head>


<body>
	<div class="container-fluid">
		<div class="row">
			<!-- Sidebar -->
			<div class="col-md-2 sidebar">
				<h4 class="text-center">Mini MMP</h4>
				<hr>
				<a href="/dashboard">Dashboard</a> <a href="/campaign">Campaign</a>
				<a href="/performance">Performance</a> <a href="/analytics">Analytics</a>
				<a href="/logout">Logout</a>
			</div>
			<!-- Main Content -->
			<div class="col-md-10 p-4">
				<h2>Marketing Dashboard</h2>
				<hr>
				<div class="row">
					<div class="col-md-3">
						<div class="card">
							<div class="card-body text-center">
								<h6>Total Campaigns</h6>
								<h3 th:text="${totalCampaigns}">0</h3>
							</div>
						</div>
					</div>
					<div class="col-md-3">
						<div class="card">
							<div class="card-body text-center">
								<h6>Total Clicks</h6>
								<h3 th:text="${totalClicks}">0</h3>
							</div>
						</div>
					</div>
					<div class="col-md-3">
						<div class="card">
							<div class="card-body text-center">
								<h6>Total Conversions</h6>
								<h3 th:text="${totalConversions}">0</h3>
							</div>
						</div>
					</div>
					<div class="col-md-3">
						<div class="card">
							<div class="card-body text-center">
								<h6>CTR</h6>
								<h3 th:text="${ctr}">0%</h3>
							</div>
						</div>
					</div>
				</div>
				<br>
				<h4>Recent Campaigns</h4>
				<table class="table table-striped">
					<thead>
						<tr>
							<th>Campaign</th>
							<th>Channel</th>
							<th>Budget</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="campaign : ${campaignList}">
							<td th:text="${campaign.name}"></td>
							<td th:text="${campaign.channel}"></td>
							<td th:text="${campaign.budget}"></td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>
	</div>
</body>
</html>
