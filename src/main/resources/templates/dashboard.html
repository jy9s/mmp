<!DOCTYPE html>

<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>DashBoard</title>

<link rel="stylesheet" type="text/css" href="../css/style.css">

<script	src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<link	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"	rel="stylesheet"	integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"	crossorigin="anonymous">
<script	src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"	integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"	crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>




</head>
<script>
	$(document).ready(function() {
		
		//최근 7일 세팅
		let today = new Date();
		let last7 = new Date();
		let last30 = new Date();
		last7.setDate(today.getDate() - 7);
		last30.setDate(today.getDate() - 30);
		
		
		const url = new URL(window.location.href);
		const startParam = url.searchParams.get("start");
		const endParam = url.searchParams.get("end");
		
		
		if (startParam && endParam) {
			$("#startDate").val(startParam);
			$("#endDate").val(endParam);
		} else {
			// 기본값 (최근 7일)
			$("#endDate").val(today.toISOString().slice(0,10));
			$("#startDate").val(last7.toISOString().slice(0,10));
		}
		
		
		
		$("#applyToday").click(function(){
			location.href = `/dashboard?start=${today.toISOString().slice(0,10)}&end=${today.toISOString().slice(0,10)}`;
		});
		
		$("#apply7days").click(function(){
			location.href = `/dashboard?start=${last7.toISOString().slice(0,10)}&end=${today.toISOString().slice(0,10)}`;
		});
		
		$("#apply30days").click(function(){
			location.href = `/dashboard?start=${last30.toISOString().slice(0,10)}&end=${today.toISOString().slice(0,10)}`;
		});
		
		
		
		//날짜 클릭 했을 때
		$("#applyDate").click(function () {

			const start = $("#startDate").val();
			const end = $("#endDate").val();
			// 나중에 API 호출
			location.href = `/dashboard?start=${start}&end=${end}`;
		});
		
		
		
		
		
		// 📈 Revenue Trend
		new Chart(document.getElementById('revenueChart'), {
			type: 'line',
			data: {
				labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'],
				datasets: [{
					label: 'Revenue',
					data: [1000, 2000, 1500, 3000, 2500],
					fill: false,
					tension: 0.1
				}]
			}
		});

		// 🥧 Channel
		new Chart(document.getElementById('channelChart'), {
			type: 'pie',
			data: {
				labels: ['Facebook', 'Google', 'Organic'],
				datasets: [{
					data: [40, 35, 25]
				}]
			}
		});

		// 📊 Funnel
		new Chart(document.getElementById('funnelChart'), {
			type: 'bar',
			data: {
				labels: ['Install', 'Signup', 'Purchase'],
				datasets: [{
					label: 'Users',
					data: [1000, 600, 200]
				}]
			}
		});
		
	});
	
</script>


<style>
body {
	background-color: #f5f6fa;
}

.sidebar {
	height: 100vh;
	background: #343a40;
	color: white;
	padding-top: 20px;
}

.sidebar a {
	color: white;
	display: block;
	padding: 12px;
	text-decoration: none;
}

.sidebar a:hover {
	background: #495057;
}

.card {
	box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
}
</style>

</head>


<body>
	<div class="container-fluid">
		<div class="row">
			<!-- Sidebar -->
			<div class="col-md-2 sidebar">
				<h4 class="text-center">Mini MMP</h4>
				<hr>
				<a href="/dashboard">Dashboard</a> <a href="/campaign">Campaign</a>
				<a href="/performance">Performance</a> <a href="/analytics">Analytics</a>
				<a href="/logout">Logout</a>
			</div>
			<!-- Main Content -->
			<div class="col-md-10 p-4">
			
				<h2>Marketing Dashboard</h2>
				<hr>
			
				<!-- 🔥 날짜 필터 -->
				<div class="d-flex justify-content-between mb-3">
					<div>
						<button class="btn btn-sm btn-outline-primary" id="applyToday">Today</button>
						<button class="btn btn-sm btn-outline-primary" id="apply7days">7 Days</button>
						<button class="btn btn-sm btn-outline-primary" id="apply30days">30 Days</button>
					</div>
					<div class="d-flex align-items-center">
						<input type="date" id="startDate" class="form-control form-control-sm me-2">
						<span class="me-2">~</span>
						<input type="date" id="endDate" class="form-control form-control-sm me-2">
						<button class="btn btn-sm btn-primary" id="applyDate">Apply</button>
					</div>
				</div>
				<!-- 🔹 커스텀 날짜 -->
						
				<!-- 🔥 KPI 영역 -->
				<div class="row">
					<div class="col-md-3">
						<div class="card text-center">
							<div class="card-body">
								<h6>Revenue</h6>
								<h3 th:text="${totalRevenue}">0</h3>
							</div>
						</div>
					</div>
			
					<div class="col-md-3">
						<div class="card text-center">
							<div class="card-body">
								<h6>Cost</h6>
								<h3 th:text="${totalConversions}">0</h3>
							</div>
						</div>
					</div>
			
					<div class="col-md-3">
						<div class="card text-center">
							<div class="card-body">
								<h6>ROAS</h6>
								<h3 th:text="${roas}">0%</h3>
							</div>
						</div>
					</div>
			
					<div class="col-md-3">
						<div class="card text-center">
							<div class="card-body">
								<h6>CPI/CPA</h6>
								<h3 th:text="${totalUsers}">0</h3>
							</div>
						</div>
					</div>
				</div>
			
				<br>

			
				<!-- 🔥 차트 영역 -->
				<div class="row">
			
					<!-- 매출 트렌드 -->
					<div class="col-md-8">
						<div class="card">
							<div class="card-body">
								<h6>Revenue Trend</h6>
								<canvas id="revenueChart"></canvas>
							</div>
						</div>
					</div>
			
					<!-- 채널별 비중 -->
					<div class="col-md-4">
						<div class="card">
							<div class="card-body">
								<h6>Channel Distribution</h6>
								<canvas id="channelChart"></canvas>
							</div>
						</div>
					</div>
			
				</div>
			
				<br>
			
				<!-- 🔥 퍼널 -->
				<div class="row">
					<div class="col-md-12">
						<div class="card">
							<div class="card-body">
								<h6>Funnel</h6>
								<canvas id="funnelChart"></canvas>
							</div>
						</div>
					</div>
				</div>
			
				<br>
			
				<!-- 🔥 테이블 -->
				<h4>Campaign Performance</h4>
				<table class="table table-striped">
					<thead>
						<tr>
							<th>Campaign</th>
							<th>Channel</th>
							<th>Cost</th>
							<th>Conversions</th>
							<th>Revenue</th>
							<th>ROAS</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="c : ${campaignList}">
							<td th:text="${c.name}"></td>
							<td th:text="${c.channel}"></td>
							<td th:text="${c.cost}"></td>
							<td th:text="${c.conversions}"></td>
							<td th:text="${c.revenue}"></td>
							<td th:text="${c.roas}"></td>
						</tr>
					</tbody>
				</table>
			
			</div>
		</div>
	</div>
</body>
</html>
